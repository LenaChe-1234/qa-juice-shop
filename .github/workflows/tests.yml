name: QA Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start Juice Shop
        run: docker compose up -d

      - name: Wait for Juice Shop
        run: |
          timeout 90s bash -c 'until curl -f http://localhost:3000; do sleep 5; done'

      - name: Run tests
        id: run_tests
        continue-on-error: true
        env:
          CI: true
          BASE_URL: http://localhost:3000
        run: npm test

      - name: Note test status
        if: always()
        run: |
          if [ "${{ steps.run_tests.outcome }}" = "failure" ]; then
            echo "⚠️ Test failures are allowed for this workflow and will not fail the job."
          else
            echo "✅ Tests completed without step-level failure."
          fi

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
